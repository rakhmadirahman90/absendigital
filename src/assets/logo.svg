    <polygon points="0,32 55,0 110,32" fill="#0b1329" stroke="url(#silverGrad)" stroke-width="2.5" stroke-linejoin="round" />
    <polygon points="10,29 55,5 100,29" fill="#1e293b" opacity="0.5" />
    <rect x="8" y="32" width="94" height="54" fill="#0f172a" stroke="url(#silverGrad)" stroke-width="2.5" stroke-linejoin="round" />
    <rect x="34" y="44" width="42" height="42" fill="#020617" stroke="url(#goldGrad)" stroke-width="2" />
    <g opacity="0.95">
