      <rect x="38" y="76" width="34" height="10" rx="2.5" fill="#fbbf24" stroke="#78350f" stroke-width="0.8" />
      <rect x="42" y="60" width="26" height="8" rx="2" fill="#d97706" stroke="#78350f" stroke-width="0.8" />
      <rect x="45" y="52" width="20" height="8" rx="1.8" fill="#f59e0b" stroke="#78350f" stroke-width="0.8" />
      <line x1="55" y1="52" x2="55" y2="86" stroke="#92400e" stroke-width="1" />
    </g>
    <rect x="18" y="44" width="16" height="42" fill="url(#shieldBg)" stroke="url(#silverGrad)" stroke-width="1.5" stroke-linejoin="round" />
    <rect x="76" y="44" width="16" height="42" fill="url(#shieldBg)" stroke="url(#silverGrad)" stroke-width="1.5" stroke-linejoin="round" />
    <line x1="18" y1="44" x2="34" y2="86" stroke="url(#silverGrad)" stroke-width="1" />
    <line x1="76" y1="44" x2="92" y2="86" stroke="url(#silverGrad)" stroke-width="1" />
  </g>

