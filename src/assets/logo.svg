    <path d="M 12,-10 C 24,-30 20,-66 -1,-78 C 8,-54 2,-20 -5,0" fill="#10b981" stroke="#022c22" stroke-width="1" />
    <path d="M -15,-5 C -8,-25 -2,-50 14,-62 C 3,-45 -4,-22 -7,2" fill="#059669" stroke="#022c22" stroke-width="0.8" opacity="0.8" />
  </g>

  <!-- 11. Bottom Ribbon Banner -->
  <g filter="url(#3dShadow)">
    <path d="M 45,410 L 25,432 L 45,454 L 45,420 Z M 455,410 L 475,432 L 455,454 L 455,420 Z" fill="#78350f" stroke="#451a03" stroke-width="1.5" />
    <path d="M 25,432 L 55,462 L 45,454 Z" fill="#92400e" />
    <path d="M 475,432 L 445,462 L 455,454 Z" fill="#92400e" />
    <path 
      d="M 45,410 
         Q 250,446 455,410 
         L 443,464 
         Q 250,500 57,464 
         Z" 
      fill="#0b1329" 
      stroke="url(#goldGrad)" 
      stroke-width="4" 
      stroke-linejoin="round"
    />
    <path 
      d="M 51,417 
         Q 250,452 449,417" 
      fill="none" 
      stroke="url(#goldGrad)" 
      stroke-width="1.5" 
