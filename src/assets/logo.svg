    <path d="M 0,0 C -18,-35 -10,-75 14,-100" fill="none" stroke="url(#goldGrad)" stroke-width="5.5" stroke-linecap="round" />
    <path d="M 0,0 C -18,-35 -10,-75 14,-100" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.4" stroke-linecap="round" />
    <g stroke="#78350f" stroke-width="1">
      <ellipse cx="-4" cy="-24" rx="6" ry="8.5" transform="rotate(-30 -4 -24)" fill="url(#goldGrad)" />
      <ellipse cx="-13" cy="-44" rx="6.5" ry="9" transform="rotate(-35 -13 -44)" fill="url(#goldGrad)" />
      <ellipse cx="-15" cy="-64" rx="6.5" ry="9" transform="rotate(-25 -15 -64)" fill="url(#goldGrad)" />
      <ellipse cx="-7" cy="-84" rx="6" ry="8.5" transform="rotate(-15 -7 -84)" fill="url(#goldGrad)" />
      <ellipse cx="6" cy="-98" rx="5.5" ry="8" transform="rotate(5 6 -98)" fill="url(#goldGrad)" />
      <ellipse cx="6" cy="-33" rx="5.5" ry="8" transform="rotate(15 6 -33)" fill="url(#goldGrad)" />
      <ellipse cx="0" cy="-53" rx="6" ry="8.5" transform="rotate(10 0 -53)" fill="url(#goldGrad)" />
      <ellipse cx="-2" cy="-73" rx="6" ry="8.5" transform="rotate(5 -2 -73)" fill="url(#goldGrad)" />
      <ellipse cx="6" cy="-88" rx="5.5" ry="8" transform="rotate(0 6 -88)" fill="url(#goldGrad)" />
