    <g transform="translate(-14, -48) rotate(-15)">
      <ellipse cx="0" cy="0" rx="14" ry="28" fill="#fbbf24" stroke="#78350f" stroke-width="1.2" />
      <circle cx="-5" cy="-18" r="2" fill="#ffffff" opacity="0.7" />
      <circle cx="0" cy="-18" r="2.5" fill="#fff7ed" />
      <circle cx="5" cy="-18" r="2" fill="#fbbf24" />
      <circle cx="-8" cy="-10" r="2.5" fill="#fbbf24" />
      <circle cx="-3" cy="-10" r="2.8" fill="#f59e0b" />
      <circle cx="3" cy="-10" r="2.8" fill="#fbbf24" />
      <circle cx="8" cy="-10" r="2.5" fill="#f59e0b" />
      <circle cx="-9" cy="0" r="2.5" fill="#fbbf24" />
      <circle cx="-4" cy="0" r="3" fill="#fbbf24" />
      <circle cx="2" cy="0" r="3" fill="#f59e0b" />
      <circle cx="8" cy="0" r="2.5" fill="#fbbf24" />
      <circle cx="-8" cy="10" r="2.5" fill="#f59e0b" />
      <circle cx="-3" cy="10" r="2.8" fill="#fbbf24" />
      <circle cx="3" cy="10" r="2.8" fill="#d97706" />
      <circle cx="7" cy="10" r="2.5" fill="#f59e0b" />
      <circle cx="-5" cy="18" r="2.2" fill="#f59e0b" />
      <circle cx="0" cy="18" r="2.5" fill="#fbbf24" />
      <circle cx="5" cy="18" r="2.2" fill="#d97706" />
    </g>
    <g transform="translate(2, -32) rotate(15)">
      <ellipse cx="0" cy="0" rx="12" ry="24" fill="#f59e0b" stroke="#78350f" stroke-width="1.2" />
      <circle cx="-4" cy="-14" r="2" fill="#fbbf24" />
      <circle cx="1" cy="-14" r="2.2" fill="#fbbf24" />
      <circle cx="5" cy="-14" r="2" fill="#d97706" />
      <circle cx="-6" cy="-6" r="2.2" fill="#f59e0b" />
      <circle cx="-1" cy="-6" r="2.5" fill="#fbbf24" />
      <circle cx="4" cy="-6" r="2.5" fill="#f59e0b" />
      <circle cx="-7" cy="4" r="2.2" fill="#fbbf24" />
      <circle cx="-2" cy="4" r="2.6" fill="#f59e0b" />
      <circle cx="3" cy="4" r="2.6" fill="#fbbf24" />
      <circle cx="7" cy="4" r="2.2" fill="#d97706" />
      <circle cx="-4" cy="12" r="2" fill="#d97706" />
      <circle cx="1" cy="12" r="2.2" fill="#f59e0b" />
